apiVersion: apiextensions.crossplane.io/v2 # Corrected: v2 is for Crossplane v1.16+ / v2.x
kind: CompositeResourceDefinition
metadata:
  name: gkeclusters.platform.tornado-demo.io
spec:
  group: platform.tornado-demo.io
  names:
    kind: GKECluster
    plural: gkeclusters
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: [parameters]
            properties:
              parameters:
                type: object
                required: [clusterName, projectId, region, vpcName, subnetName]
                properties:
                  clusterName: { type: string }
                  clusterType:
                    type: string
                    enum: ["control-plane", "workload"]
                    default: "workload"
                  projectId: { type: string }
                  region: { type: string }
                  zone: { type: string }
                  vpcName: { type: string }
                  subnetName: { type: string }
                  machineType: { type: string, default: "e2-standard-2" }
                  minNodes: { type: integer, default: 2 }
                  maxNodes: { type: integer, default: 5 }
                  crossplane:
                    type: object
                    properties:
                      enabled: { type: boolean, default: false }
                      version: { type: string, default: "v2.5.0" }
          status:
            type: object
            properties:
              clusterEndpoint: { type: string }
              clusterName: { type: string }
              controlPlaneStatus: { type: string }
              nodeCount: { type: integer }
