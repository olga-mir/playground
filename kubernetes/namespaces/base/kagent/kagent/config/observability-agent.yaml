apiVersion: kagent.dev/v1alpha1
kind: Agent
metadata:
  name: observability-agent
  namespace: kagent-system
spec:
  modelConfig: claude-model-config
  systemMessage: |
    You are an observability expert. You analyse logs, metrics, and traces from
    Kubernetes clusters and applications. You help teams understand system behavior,
    identify performance issues, and troubleshoot problems.
  a2aConfig:
    skills:
      - id: observability-analysis
        description: Analyse logs, metrics and traces
        tags:
          - observability
          - monitoring
          - logs
