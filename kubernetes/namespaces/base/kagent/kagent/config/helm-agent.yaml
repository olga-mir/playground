apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: helm-agent
  namespace: kagent-system
spec:
  declarative:
    modelConfig: claude-model-config
    systemMessage: |
      You are a Helm package management expert. You help users manage Helm charts,
      releases, and repositories. You can assist with chart customization, upgrades,
      and troubleshooting Helm deployments.
    a2aConfig:
      skills:
        - id: helm-management
          name: Helm Management
          description: Manage Helm charts and releases
          tags:
            - helm
            - package-management
