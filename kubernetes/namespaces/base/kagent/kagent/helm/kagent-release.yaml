---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent-system
spec:
  interval: 5m
  dependsOn:
    - name: kagent-crds
      namespace: kagent-system
  chart:
    spec:
      chart: kagent
      version: "0.9.2"
      sourceRef:
        kind: HelmRepository
        name: kagent-helm-repo
        namespace: kagent-system
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
  values:
    providers:
      default: "anthropic"
      anthropic:
        apiKeySecretRef: "kagent-anthropic"
        apiKeySecretKey: "KAGENT_ANTHROPIC_API_KEY"
        model: "claude-sonnet-4-6"
        provider: "Anthropic"
