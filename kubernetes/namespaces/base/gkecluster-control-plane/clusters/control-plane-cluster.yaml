apiVersion: platform.tornado-demo.io/v1alpha1
kind: GKECluster
metadata:
  name: control-plane-cluster
  namespace: control-plane
spec:
  parameters:
    clusterName: "${GKE_CONTROL_PLANE_CLUSTER:-control-plane}"
    clusterType: control-plane
    projectId: "${PROJECT_ID}"
    region: "${REGION}"
    zone: "${ZONE}"
    vpcName: "${GKE_VPC}"
    subnetName: "${CONTROL_PLANE_SUBNET_NAME:-cluster-control-plane-subnet}"
    machineType: "e2-standard-4"
    minNodes: 2
    maxNodes: 5
