version: "3"

tasks:
  update-github-app-key:
    desc: "Update the GitHub App Private Key in Google Secret Manager"
    preconditions:
      - sh: test -n "$PROJECT_ID"
        msg: "PROJECT_ID is not set"
      - sh: test -n "$GITHUB_APP_PRIVATE_KEY_FILE"
        msg: "GITHUB_APP_PRIVATE_KEY_FILE is not set"
    cmds:
      - echo "Updating github-app-private-key secret..."
      - gcloud secrets versions add github-app-private-key --data-file="${GITHUB_APP_PRIVATE_KEY_FILE}" --project="${PROJECT_ID}"
      - echo "✅ github-app-private-key updated successfully."

  update-gh-flux-pat:
    desc: "Update the GitHub PAT used by Flux for notifications in Google Secret Manager"
    preconditions:
      - sh: test -n "$PROJECT_ID"
        msg: "PROJECT_ID is not set"
      - sh: test -n "$GITHUB_FLUX_PLAYGROUND_PAT"
        msg: "GITHUB_FLUX_PLAYGROUND_PAT is not set (add to your environment or .setup-env)"
    cmds:
      - echo "Updating gh-flux-pat secret..."
      - echo -n "${GITHUB_FLUX_PLAYGROUND_PAT}" | gcloud secrets versions add gh-flux-pat --data-file=- --project="${PROJECT_ID}"
      - echo "✅ gh-flux-pat updated successfully."

  update-kagent-anthropic-key:
    desc: "Update the Anthropic API key for kagent in Google Secret Manager"
    preconditions:
      - sh: test -n "$PROJECT_ID"
        msg: "PROJECT_ID is not set"
      - sh: test -n "$KAGENT_ANTHROPIC_API_KEY"
        msg: "KAGENT_ANTHROPIC_API_KEY is not set (add to your environment or .setup-env)"
    cmds:
      - echo "Updating kagent-anthropic-api-key secret..."
      - echo -n "${KAGENT_ANTHROPIC_API_KEY}" | gcloud secrets versions add kagent-anthropic-api-key --data-file=- --project="${PROJECT_ID}"
      - echo "✅ kagent-anthropic-api-key updated successfully."

  update-all:
    desc: "Update all secrets in Google Secret Manager"
    cmds:
      - task: update-github-app-key
      - task: update-gh-flux-pat
      - task: update-kagent-anthropic-key
