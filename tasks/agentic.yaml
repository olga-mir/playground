version: "3"

tasks:
  deploy:
    desc: "Agentic deploy: AI-monitored self-fixing equivalent of 'task setup:deploy' (set mission in orchestrator/mission.md first)"
    preconditions:
      - sh: test -n "$PROJECT_ID"
        msg: "PROJECT_ID is not set"
      - sh: command -v uv
        msg: "uv not found — install from https://docs.astral.sh/uv/"
      - sh: command -v claude
        msg: "claude CLI not found — install Claude Code first"
    env:
      GRPC_VERBOSITY: error
    cmds:
      - uv run --directory {{.ROOT_DIR}}/orchestrator python main.py

  check:
    desc: "Check current cluster state without install (skips initial wait)"
    preconditions:
      - sh: command -v uv
        msg: "uv not found — install from https://docs.astral.sh/uv/"
      - sh: command -v claude
        msg: "claude CLI not found — install Claude Code first"
    env:
      GRPC_VERBOSITY: error
    cmds:
      - uv run --directory {{.ROOT_DIR}}/orchestrator python main.py --skip-install

  resume:
    desc: "Resume agentic deploy from a specific phase (usage: task agentic:resume PHASE=control)"
    preconditions:
      - sh: test -n "{{.PHASE}}"
        msg: "PHASE is required — usage: task agentic:resume PHASE=bootstrap|control|workload"
      - sh: command -v uv
        msg: "uv not found — install from https://docs.astral.sh/uv/"
      - sh: command -v claude
        msg: "claude CLI not found — install Claude Code first"
    vars:
      PHASE: '{{.PHASE | default "bootstrap"}}'
    env:
      GRPC_VERBOSITY: error
    cmds:
      - uv run --directory {{.ROOT_DIR}}/orchestrator python main.py --skip-install --start-phase {{.PHASE}}

  sync:
    desc: "Sync orchestrator Python dependencies (uv)"
    preconditions:
      - sh: command -v uv
        msg: "uv not found — install from https://docs.astral.sh/uv/"
    cmds:
      - uv sync --directory {{.ROOT_DIR}}/orchestrator
