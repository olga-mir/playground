version: "3"

tasks:
  run:
    desc: "Full provisioning run: install + bootstrap + control + workload phases (set mission in orchestrator/mission.md first)"
    preconditions:
      - sh: test -n "$PROJECT_ID"
        msg: "PROJECT_ID is not set"
      - sh: command -v uv
        msg: "uv not found — install from https://docs.astral.sh/uv/"
      - sh: command -v claude
        msg: "claude CLI not found — install Claude Code first"
    cmds:
      - uv run --directory {{.ROOT_DIR}}/orchestrator python main.py

  check:
    desc: "Check current cluster state (no install, skips initial wait)"
    preconditions:
      - sh: command -v uv
        msg: "uv not found — install from https://docs.astral.sh/uv/"
      - sh: command -v claude
        msg: "claude CLI not found — install Claude Code first"
    cmds:
      - uv run --directory {{.ROOT_DIR}}/orchestrator python main.py --skip-install

  resume:
    desc: "Resume from a specific phase (usage: task orchestrate:resume PHASE=control)"
    preconditions:
      - sh: test -n "{{.PHASE}}"
        msg: "PHASE is required — usage: task orchestrate:resume PHASE=bootstrap|control|workload"
      - sh: command -v uv
        msg: "uv not found — install from https://docs.astral.sh/uv/"
      - sh: command -v claude
        msg: "claude CLI not found — install Claude Code first"
    vars:
      PHASE: '{{.PHASE | default "bootstrap"}}'
    cmds:
      - uv run --directory {{.ROOT_DIR}}/orchestrator python main.py --skip-install --start-phase {{.PHASE}}

  sync:
    desc: "Sync orchestrator Python dependencies (uv)"
    preconditions:
      - sh: command -v uv
        msg: "uv not found — install from https://docs.astral.sh/uv/"
    cmds:
      - uv sync --directory {{.ROOT_DIR}}/orchestrator
