name: Crossplane Consumer Validation

on:
  workflow_call:
    inputs:
      base_sha:
        type: string
        required: true
  push:
    branches:
      - main
      - 'releases/**'
    paths:
      - 'kubernetes/namespaces/base/gkecluster-*/**'
      - 'kubernetes/tenants/base/cloudrun-deployments/**'

jobs:
  validate-crossplane-consumers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Detect and validate changed consumer files
        run: |
          echo "## Detecting Changes"

          BASE_SHA="${{ inputs.base_sha }}"
          if [[ -z "$BASE_SHA" ]]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          CONSUMER_FILES=$(echo "$CHANGED_FILES" | grep -E '\.(yaml|yml)$' | grep -E \
            'kubernetes/namespaces/base/gkecluster-|kubernetes/tenants/base/cloudrun-deployments/' \
            || true)

          if [[ -z "$CONSUMER_FILES" ]]; then
            echo "No Crossplane consumer files changed. Skipping validation."
            exit 0
          fi

          echo ""
          echo "## Consumer files to validate:"
          echo "$CONSUMER_FILES"
          echo ""

          echo "## Validating Files"
          ERROR_COUNT=0

          for file in $CONSUMER_FILES; do
            if [[ ! -f "$file" ]]; then
              echo "Skipping deleted file: $file"
              continue
            fi

            echo "Validating: $file"

            if ! yq eval '.' "$file" >/dev/null 2>&1; then
              echo "  YAML syntax error in $file"
              ((ERROR_COUNT++))
              continue
            fi

            if ! yq eval '.apiVersion and .kind and .metadata.name' "$file" | grep -q "true"; then
              echo "  $file missing required fields (apiVersion, kind, metadata.name)"
              ((ERROR_COUNT++))
              continue
            fi

            echo "  $file validated successfully"
          done

          echo ""
          if [[ $ERROR_COUNT -eq 0 ]]; then
            echo "## All consumer files validated successfully!"
          else
            echo "## Validation failed with $ERROR_COUNT errors"
            exit 1
          fi
