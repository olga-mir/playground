name: Upgrade Component Versions

# Runs weekly to bump versions in README and Helm manifests.
# Uploads a run log to GCS after completion.
#
# Required secrets: ANTHROPIC_API_KEY, GCS_LOG_BUCKET, WIF_PROVIDER, WIF_SERVICE_ACCOUNT

on:
  schedule:
    - cron: "0 9 * * 3"  # Every Wednesday at 09:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  upgrade-versions:
    name: Upgrade component versions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run upgrade-versions skill
        id: upgrade
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          display_report: "true"
          prompt: |
            Use the upgrade-versions skill to check and upgrade all component versions in this project.

            After the skill completes:
            - If any versions were updated, create a new branch named `chore/upgrade-versions-YYYY-MM-DD`
              (using today's date), commit the changes with message `chore: upgrade component versions`,
              push the branch, and open a pull request targeting the `main` branch.
              The PR title should be "chore: upgrade component versions <date>" and the body should
              include the summary table from the skill (component, old version, new version, files changed).
            - If no versions needed updating, just report that everything is already up to date and exit.

      - name: Authenticate to Google Cloud
        if: always()
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Upload run log to GCS
        if: always()
        run: |
          DEST="gs://${{ secrets.GCS_LOG_BUCKET }}/$(date -u +%Y-%m-%d)_run${{ github.run_number }}_claude-execution-output.json"
          gcloud storage cp /home/runner/work/_temp/claude-execution-output.json "${DEST}"
          DEST_PROMPT="gs://${{ secrets.GCS_LOG_BUCKET }}/$(date -u +%Y-%m-%d)_run${{ github.run_number }}_claude-prompt.txt"
          gcloud storage cp /home/runner/work/_temp/claude-prompts/claude-prompt.txt "${DEST_PROMPT}"
