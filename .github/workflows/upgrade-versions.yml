name: Upgrade Component Versions

# Runs weekly to bump versions in Helm manifests, Crossplane packages, and README.
# Bash scripts handle version discovery and GitHub API calls (cheap).
# Claude handles applying the diffs and opening the PR (smart but expensive).
#
# Required secrets: ANTHROPIC_API_KEY, GCS_LOG_BUCKET, WIF_PROVIDER, WIF_SERVICE_ACCOUNT

on:
  schedule:
    - cron: "0 9 * * 3"  # Every Wednesday at 09:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  upgrade-versions:
    name: Upgrade component versions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan current versions and fetch latest from GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash bootstrap/scripts/scan-versions.sh \
            | bash bootstrap/scripts/fetch-latest-versions.sh \
            > .version-report.md
          echo "=== Version report ==="
          cat .version-report.md

      - name: Apply version updates
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          display_report: "true"
          allowed_tools: "Bash,Read,Glob,Grep"
          prompt: |
            Read `.version-report.md`. It contains a table of all versioned components,
            their current versions, latest releases, and whether an update is needed.

            For each row marked **YES** in the "Update?" column, apply the version update
            using `sed -i` via Bash (do NOT use Edit or Write tools — they require interactive
            approval in this environment and will fail):

            - type=helm: `sed -i 's|version: "OLD"|version: "NEW"|' FILE`
            - type=crossplane: `sed -i 's|:OLD_VER|:NEW_VER|g' FILE`
            - type=readme: `sed -i 's|OLD_VER|NEW_VER|g' README.md`
              (updates both the link text and the URL in one pass since both contain the version)

            Rules:
            1. For each helm or crossplane update, also update the matching component in
               README.md tech-stack table if it appears there.
            2. Do NOT read `gotk-components.yaml`. This is a huge file and is out of scope.
            3. If the same version appears in multiple files (e.g. providers-bootstrap),
               update ALL of them.
            4. Do not update Crossplane itself. It is out of scope and requires special process
            4. Skip rows where latest_version is "unknown".

            After applying all updates:
            - If any files were changed:
              - Create branch `chore/upgrade-versions-YYYY-MM-DD` (today's date)
              - Commit with message `chore: upgrade component versions`
              - Push the branch
              - Open a pull request targeting the `main` branch with:
                - Title: `chore: upgrade component versions <date>`
                - Body: summary table of what changed (component, old version, new version, files)
            - If nothing needed updating, just report that everything is up to date.

      - name: Mask sensitive values
        if: always()
        env:
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          GCS_LOG_BUCKET: ${{ secrets.GCS_LOG_BUCKET }}
        run: |
          echo "::add-mask::${PROJECT_ID}"
          echo "::add-mask::${GCS_LOG_BUCKET}"

      - name: Authenticate to Google Cloud
        if: always()
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Upload run log to GCS
        if: always()
        env:
          GCS_LOG_BUCKET: ${{ secrets.GCS_LOG_BUCKET }}
        run: |
          # Strip gs:// prefix if included in the secret value
          BUCKET="${GCS_LOG_BUCKET#gs://}"
          PREFIX="${BUCKET}/$(date -u +%Y-%m-%d)_run${{ github.run_number }}"
          gcloud storage cp /home/runner/work/_temp/claude-execution-output.json "gs://${PREFIX}_claude-execution-output.json" || true
          gcloud storage cp /home/runner/work/_temp/claude-prompts/claude-prompt.txt "gs://${PREFIX}_claude-prompt.txt" || true
