name: Upgrade Component Versions

# Learning experiment, checkout "demo" folder in the repo

# Runs weekly to bump versions in Helm manifests, Crossplane packages, and README.
# Bash scripts handle version discovery and GitHub API calls (cheap, no LLM tokens).
# Claude reads the pre-computed report and applies targeted edits (fast, low token cost).
#
# Required secrets: KAGENT_ANTHROPIC_API_KEY, GCS_LOG_BUCKET, WIF_PROVIDER, WIF_SERVICE_ACCOUNT
# See docs/upgrade-versions.md for full process documentation.

on:
  #schedule:
  #  - cron: "0 9 * * 3"  # Every Wednesday at 09:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  upgrade-versions:
    name: Upgrade component versions
    runs-on: ubuntu-latest
    if: github.actor == 'olga-mir'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan current versions and fetch latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/scan-versions.sh \
            | bash scripts/fetch-latest-versions.sh \
            > .version-report.md
          echo "=== Version report ==="
          cat .version-report.md

      - name: Apply version updates
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.KAGENT_ANTHROPIC_API_KEY }}

          # there's an open issue (#860) that track_progress: true merges in 18 additional write tools (Edit, MultiEdit, git commands) that override `--allowedTools` because the merge is additive, not restrictive
          # track_progress is only supported for events: pull_request, issues, issue_comment, pull_request_review_comment, pull_request_review. Current event: workflow_dispatch
          # track_progress: true

          claude_args: >-
            --allowedTools "Bash,Read,Glob,Grep,Skill"
            --max-turns 25
          settings: |
            {
              "permissions": {
                "defaultMode": "acceptEdits"
              },
              "hooks": {
                "PreToolUse": [
                  {
                    "matcher": "Skill",
                    "hooks": [
                      {
                        "type": "command",
                        "command": "skill=$(echo \"$CLAUDE_TOOL_INPUT\" | jq -r '.skill // empty'); if [ \"$skill\" != \"upgrade-versions\" ]; then echo \"Blocked: only upgrade-versions skill is permitted in this workflow\"; exit 2; fi"
                      }
                    ]
                  }
                ]
              }
            }
          prompt: "/upgrade-versions"
          display_report: "true"

      - name: Mask sensitive values
        if: always()
        env:
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          GCS_LOG_BUCKET: ${{ secrets.GCS_LOG_BUCKET }}
        run: |
          echo "::add-mask::${PROJECT_ID}"
          echo "::add-mask::${GCS_LOG_BUCKET}"

      - name: Authenticate to Google Cloud
        if: always()
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Upload run log to GCS
        if: always()
        env:
          GCS_LOG_BUCKET: ${{ secrets.GCS_LOG_BUCKET }}
        run: |
          # Strip gs:// prefix if included in the secret value
          BUCKET="${GCS_LOG_BUCKET#gs://}"
          PREFIX="${BUCKET}/$(date -u +%Y-%m-%d)_run${{ github.run_number }}"
          gcloud storage cp /home/runner/work/_temp/claude-execution-output.json "gs://${PREFIX}_claude-execution-output.json" || true
          ls /home/runner/work/_temp/
