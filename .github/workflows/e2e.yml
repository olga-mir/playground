name: E2E Tests

# Runs GKE e2e tests. Callable from the release workflow or dispatched standalone.
# GKE infra must already be running; kind cluster is excluded.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Label for artifact naming (defaults to run ID)'
        required: false
        type: string
      skip_chaos:
        description: 'Skip LitmusChaos experiments (destructive — skip unless explicitly testing chaos resilience)'
        type: boolean
        default: true
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      skip_chaos:
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  e2e:
    name: E2E Tests (GKE only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.PROJECT_ID }}

      - name: Install GKE auth plugin
        run: |
          # Use apt to install the plugin as it is the most reliable way on Ubuntu runners
          sudo apt-get update -y && sudo apt-get install -y google-cloud-sdk-gke-gcloud-auth-plugin
          # Configure gcloud to use the plugin
          gcloud config set sdk/install_base_prefix /usr/lib/google-cloud-sdk
          export USE_GKE_GCLOUD_AUTH_PLUGIN=True
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> $GITHUB_ENV

      - name: Mask project ID
        run: echo "::add-mask::${{ secrets.PROJECT_ID }}"

      # GKE infra is expected to be running; discover each cluster's location
      # (zonal or regional) and write its kubeconfig context so pytest finds
      # them via `kubectl config get-contexts`. Without this, conftest.py's
      # lazy fetch silently fails on the runner (no gke-gcloud-auth-plugin)
      # and every GKE test gets skipped.
      - name: Discover GKE cluster locations
        id: discover
        env:
          CLOUDSDK_CORE_PROJECT: ${{ secrets.PROJECT_ID }}
        run: |
          set -euo pipefail

          control_plane_location=$(gcloud container clusters list \
            --filter='name=control-plane' \
            --format='value(location)' | head -n1)
          apps_dev_location=$(gcloud container clusters list \
            --filter='name=apps-dev' \
            --format='value(location)' | head -n1)

          if [ -z "$control_plane_location" ] && [ -z "$apps_dev_location" ]; then
            echo "::error::No control-plane or apps-dev GKE clusters found in project. E2E requires running infrastructure."
            exit 1
          fi

          echo "control_plane_location=$control_plane_location" >> "$GITHUB_OUTPUT"
          echo "apps_dev_location=$apps_dev_location" >> "$GITHUB_OUTPUT"

          echo "control-plane location: ${control_plane_location:-<not found, GKE tests for it will skip>}"
          echo "apps-dev location: ${apps_dev_location:-<not found, GKE tests for it will skip>}"

      - name: Fetch control-plane kubeconfig
        if: steps.discover.outputs.control_plane_location != ''
        uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
        with:
          cluster_name: control-plane
          location: ${{ steps.discover.outputs.control_plane_location }}

      - name: Fetch apps-dev kubeconfig
        if: steps.discover.outputs.apps_dev_location != ''
        uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395 # v3.0.0
        with:
          cluster_name: apps-dev
          location: ${{ steps.discover.outputs.apps_dev_location }}

      - name: Verify cluster connectivity
        run: |
          echo "Checking connectivity to control-plane..."
          if [ "${{ steps.discover.outputs.control_plane_location }}" != "" ]; then
            kubectl --context="gke_${{ secrets.PROJECT_ID }}_${{ steps.discover.outputs.control_plane_location }}_control-plane" cluster-info || echo "::warning::Failed to connect to control-plane"
          fi
          echo "Checking connectivity to apps-dev..."
          if [ "${{ steps.discover.outputs.apps_dev_location }}" != "" ]; then
            kubectl --context="gke_${{ secrets.PROJECT_ID }}_${{ steps.discover.outputs.apps_dev_location }}_apps-dev" cluster-info || echo "::warning::Failed to connect to apps-dev"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install e2e dependencies
        run: pip install -r tests/e2e/requirements.txt

      - name: Run e2e tests (GKE clusters, kind excluded)
        env:
          CLOUDSDK_CORE_PROJECT: ${{ secrets.PROJECT_ID }}
        run: |
          MARKS="not kind"
          if [ "${{ inputs.skip_chaos }}" = "true" ]; then
            MARKS="$MARKS and not slow"
          fi
          mkdir -p release-artifacts
          pytest tests/e2e \
            -v --tb=short \
            -m "$MARKS" \
            --junit-xml=release-artifacts/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ inputs.version || github.run_id }}
          path: release-artifacts/
          retention-days: 90
