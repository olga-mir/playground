name: Flux Bootstrap GKE Clusters

# Requires repository secrets: PROJECT_ID, GH_APP_ID, GH_APP_INSTALLATION_ID, GH_APP_PRIVATE_KEY, GH_FLUX_PAT
# bootstrap uses built-in GITHUB_TOKEN (contents: write) to run flux bootstrap;
# App secrets are used to replace the flux-system secret so source-controller handles token refresh.
# GH_FLUX_PAT is a PAT with repo scope used for the Flux notification provider (github-webhook-token secret).
# See docs/github-app-setup.md for setup instructions.
run-name: "Flux Bootstrap: ${{ github.event.client_payload.metadata.cluster || 'Unknown Cluster' }} 🚀"

on:
  repository_dispatch:
    types:
      - Kustomization/clusters.flux-system

concurrency:
  group: fluxcd-bootstrap-${{ github.event.client_payload.metadata.cluster }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  bootstrap-flux:
    name: Bootstrap Flux on GKE Cluster
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Extract cluster info from payload and set project from secret
      id: cluster-info
      env:
        PROJECT_ID: ${{ secrets.PROJECT_ID }}
      run: |
        LOCATION="${{ github.event.client_payload.metadata.location }}"
        CLUSTER="${{ github.event.client_payload.metadata.cluster }}"

        # Mask sensitive information FIRST before any output
        echo "::add-mask::${PROJECT_ID}"

        # Print the event message from the payload
        echo "📨 Event message: ${{ github.event.client_payload.message || 'No message in payload' }}"

        echo "projectID=${PROJECT_ID}" >> $GITHUB_OUTPUT
        echo "cluster=${CLUSTER}" >> $GITHUB_OUTPUT
        echo "location=${LOCATION}" >> $GITHUB_OUTPUT

    - name: Setup Flux CLI
      uses: fluxcd/flux2/action@main

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        token_format: access_token
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
        project_id: ${{ secrets.PROJECT_ID }}

    - name: Wait for cluster provisioning and readiness
      env:
        PROJECT_ID: ${{ steps.cluster-info.outputs.projectID }}
      run: |

        IMMEDIATE="${{ github.event.client_payload.metadata.immediate }}"
        if [ "$IMMEDIATE" = "true" ]; then
          echo "🚀 Immediate mode enabled - skipping initial wait"
        else
          echo "🕒 Waiting 7 minutes for cluster ${{ steps.cluster-info.outputs.cluster }} to be provisioned..."
          # Initial 7-minute wait for cluster provisioning
          sleep 420
        fi

        echo "⏳ Now polling for cluster readiness (max 15 minutes at 30s intervals)..."

        # Poll for cluster existence (max 15 minutes)
        timeout_seconds=900
        elapsed=0

        while [ $elapsed -lt $timeout_seconds ]; do
          if gcloud container clusters describe "${{ steps.cluster-info.outputs.cluster }}" \
              --location="${{ steps.cluster-info.outputs.location }}" \
              --project="${{ steps.cluster-info.outputs.projectID }}" >/dev/null 2>&1; then
            echo "✅ Cluster exists and is accessible"
            break
          else
            echo "⏸️  Cluster not yet available, waiting 30 seconds... (elapsed: ${elapsed}s)"
            sleep 30
            elapsed=$((elapsed + 30))
          fi
        done

        if [ $elapsed -ge $timeout_seconds ]; then
          echo "Timeout waiting for cluster to exist"
          echo "Listing all clusters in project and location for debugging:"
          gcloud container clusters list --project="${{ steps.cluster-info.outputs.projectID }}" || true
          exit 1
        fi

    - name: Get GKE credentials
      id: get-credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ steps.cluster-info.outputs.cluster}}
        location: ${{ steps.cluster-info.outputs.location }}

    - name: Wait for cluster to be ready
      id: cluster-ready
      run: |
        echo "Checking if cluster is ready..."

        # Wait for cluster to be accessible (max 10 minutes)
        timeout_seconds=600
        elapsed=0

        while [ $elapsed -lt $timeout_seconds ]; do
          if kubectl cluster-info >/dev/null 2>&1; then
            echo "Cluster is accessible via kubectl"

            # Wait for essential system pods to be ready
            echo "Waiting for kube-system pods to be ready..."
            if kubectl wait --for=condition=Ready pods --all -n kube-system --timeout=300s; then
              echo "Cluster is ready for Flux bootstrap"
              break
            else
              echo "Some kube-system pods are not ready yet"
            fi
          else
            echo "Cluster not yet accessible, waiting..."
          fi

          sleep 30
          elapsed=$((elapsed + 30))
        done

        if [ $elapsed -ge $timeout_seconds ]; then
          echo "Timeout waiting for cluster to be ready"
          exit 1
        fi

    - name: Create cluster config
      run: |
        # Create the namespace if it doesn't already exist
        kubectl get namespace flux-system >/dev/null 2>&1 || kubectl create namespace flux-system
        # Derive REGION from ZONE by stripping the trailing zone letter (e.g. australia-southeast1-a -> australia-southeast1)
        ZONE="${{ steps.cluster-info.outputs.location }}"
        REGION="${ZONE%-*}"
        # Always create or update the ConfigMap with all variables needed by Flux postBuild substituteFrom
        kubectl create configmap platform-config -n flux-system \
          --from-literal=ZONE="${ZONE}" \
          --from-literal=REGION="${REGION}" \
          --from-literal=CLUSTER_NAME="${{ steps.cluster-info.outputs.cluster }}" \
          --from-literal=PROJECT_ID="${{ steps.cluster-info.outputs.projectID }}" \
          --from-literal=REPO_OWNER="${{ github.repository_owner }}" \
          --from-literal=REPO_NAME="${{ github.event.repository.name }}" \
          --from-literal=GKE_APPS_DEV_CLUSTER="apps-dev" \
          --from-literal=GKE_VPC="gke-vpc" \
          --from-literal=APPS_DEV_SUBNET_NAME="gke-apps-dev-subnet" \
          --dry-run=client -o yaml | kubectl apply -f -


    - name: Run Flux pre-installation checks
      run: |
        flux check --pre

    - name: Reset flux-system secret before bootstrap
      run: |
        # On re-bootstrap the flux-system secret may still contain GitHub App
        # credentials from a previous run.  flux bootstrap uses kubectl apply
        # (3-way merge) which does NOT remove extra keys that are absent from
        # its own last-applied-configuration — so githubAppID and friends stay
        # in the secret.  source-controller then rejects the GitRepository with
        # "has github app data but provider is not set to github", the bootstrap
        # wait times out, and we never reach the step that patches provider.
        # Deleting the secret first gives flux bootstrap a clean slate.
        kubectl delete secret flux-system -n flux-system --ignore-not-found

    - name: Bootstrap Flux
      id: bootstrap
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        CLUSTER_NAME="${{ steps.cluster-info.outputs.cluster }}"

        flux bootstrap github \
          --token-auth \
          --owner="${{ github.repository_owner }}" \
          --repository="${{ github.event.repository.name }}" \
          --branch="develop" \
          --path="./kubernetes/clusters/${CLUSTER_NAME}" \
          --personal \
          --network-policy=true \
          --components-extra=image-reflector-controller,image-automation-controller \
          --timeout=10m0s

    - name: Replace flux-system secret with GitHub App credentials
      env:
        GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      run: |
        # flux bootstrap --token-auth writes the flux-system secret with the workflow's
        # GITHUB_TOKEN. Replace it immediately with GitHub App credentials so
        # source-controller handles token refresh automatically going forward.
        printf '%b' "${GH_APP_PRIVATE_KEY}" > /tmp/github-app-private-key.pem
        kubectl create secret generic flux-system \
          -n flux-system \
          --from-literal=githubAppID="${{ secrets.GH_APP_ID }}" \
          --from-literal=githubAppInstallationID="${{ secrets.GH_APP_INSTALLATION_ID }}" \
          --from-file=githubAppPrivateKey=/tmp/github-app-private-key.pem \
          --dry-run=client -o yaml | kubectl apply -f -
        rm /tmp/github-app-private-key.pem

    - name: Create github-webhook-token secret for Flux notification provider
      run: |
        # The notification provider uses this secret to dispatch repository_dispatch events
        # to trigger downstream cluster bootstrapping (e.g. apps-dev after control-plane).
        # Must be created before Flux reconciles the notification alert, otherwise the first
        # GKECluster-ready event will fail to dispatch and won't fire again.
        kubectl create secret generic github-webhook-token \
          -n flux-system \
          --from-literal=token="${{ secrets.GH_FLUX_PAT }}" \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Set provider on GitRepository resources
      run: |
        # flux bootstrap regenerates gotk-sync.yaml without the provider field,
        # which breaks GitHub App auth. Patch it live and also fix it in git so
        # kustomize-controller doesn't revert the live patch on the next reconciliation.
        CLUSTER_NAME="${{ steps.cluster-info.outputs.cluster }}"
        SYNC_FILE="./kubernetes/clusters/${CLUSTER_NAME}/flux-system/gotk-sync.yaml"

        # Patch live resource
        for repo in $(kubectl get gitrepository -n flux-system -o name); do
          secret=$(kubectl get -n flux-system "${repo}" -o jsonpath='{.spec.secretRef.name}' 2>/dev/null || true)
          if [ "${secret}" = "flux-system" ]; then
            kubectl patch -n flux-system "${repo}" --type=merge -p '{"spec":{"provider":"github"}}'
          fi
        done

        # Fix the file in git so kustomize-controller doesn't revert the live patch
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase origin develop
        if grep -q 'provider: github' "${SYNC_FILE}"; then
          echo "provider: github already present in ${SYNC_FILE}, no commit needed"
        else
          sed -i 's|  secretRef:|  provider: github\n  secretRef:|' "${SYNC_FILE}"
          git add "${SYNC_FILE}"
          git commit -m "fix: restore provider: github in ${CLUSTER_NAME} gotk-sync.yaml after flux bootstrap"
          git push origin HEAD:develop
        fi

    - name: Run Flux installation checks
      run: |
        flux check
        echo "Flux bootstrap completed for cluster: ${{ steps.cluster-info.outputs.cluster }}"

    - name: Wait for Flux reconciliation and trigger stalled kustomizations
      run: |
        echo "🕒 Waiting 2 minutes for initial Flux reconciliation..."
        sleep 120

        echo "📋 Checking Flux kustomizations status:"
        flux get all -A

        echo ""
        echo "🔄 Triggering reconciliation for any non-Ready kustomizations..."

        # Get list of kustomizations that are not Ready (excluding those with empty READY column)
        NOT_READY=$(kubectl get kustomizations.kustomize.toolkit.fluxcd.io -A --no-headers | \
          awk '$6 != "True" && $6 != "" {print $1":"$2}' | grep -v '^$' || true)

        if [ -n "$NOT_READY" ]; then
          echo "Found non-Ready kustomizations, triggering reconciliation:"
          echo "$NOT_READY" | while IFS=':' read -r namespace name; do
            echo "  🔄 Reconciling kustomization $name in namespace $namespace"
            flux reconcile kustomization "$name" -n "$namespace" --timeout=3s || echo "    ⚠️ Failed to reconcile $name"
          done
        else
          echo "✅ All kustomizations are Ready, no action needed"
        fi

        echo ""
        echo "🕒 Waiting 30 seconds for reconciliation to complete..."
        sleep 30

        echo "📋 Final Flux status after reconciliation:"
        flux get all -A
