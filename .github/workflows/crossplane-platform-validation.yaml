name: Crossplane Platform Validation

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      base_sha:
        type: string
        required: true

jobs:
  validate-platform:
    runs-on: ubuntu-latest
    if: github.actor == 'olga-mir'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          # Install Crossplane CLI
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | bash
          sudo mv crossplane /usr/local/bin/

          # Install yq for YAML processing
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          echo "Installed tools:"
          crossplane version --client
          yq --version

      - name: Detect and categorize changed files
        id: changes
        run: |
          BASE_SHA="${{ inputs.base_sha }}"
          if [[ -z "$BASE_SHA" ]]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          echo "Detecting changed platform files (base: $BASE_SHA)..."
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}")

          COMPOSITIONS=$(echo "$CHANGED_FILES" | grep -E 'kubernetes/components/crossplane-compositions/.*-composition\.yaml$' || true)
          XRDS=$(echo "$CHANGED_FILES" | grep -E 'kubernetes/components/crossplane-compositions/.*-xrd\.yaml$' || true)
          FUNCTIONS=$(echo "$CHANGED_FILES" | grep 'kubernetes/namespaces/base/crossplane-system/functions/' || true)
          PROVIDERS=$(echo "$CHANGED_FILES" | grep 'kubernetes/namespaces/base/crossplane-system/providers/' || true)
          CONFIGS=$(echo "$CHANGED_FILES" | grep -E 'kubernetes/namespaces/base/crossplane-system/(provider-configs|environment-configs)/' || true)

          echo "Changed files summary:"
          echo "Compositions: $(echo "$COMPOSITIONS" | grep -c . || true)"
          echo "XRDs: $(echo "$XRDS" | grep -c . || true)"
          echo "Functions: $(echo "$FUNCTIONS" | grep -c . || true)"
          echo "Providers: $(echo "$PROVIDERS" | grep -c . || true)"
          echo "Configs: $(echo "$CONFIGS" | grep -c . || true)"

          {
            echo "compositions<<EOF"
            echo "$COMPOSITIONS"
            echo "EOF"
            echo "xrds<<EOF"
            echo "$XRDS"
            echo "EOF"
            echo "functions<<EOF"
            echo "$FUNCTIONS"
            echo "EOF"
            echo "providers<<EOF"
            echo "$PROVIDERS"
            echo "EOF"
            echo "configs<<EOF"
            echo "$CONFIGS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Validate YAML syntax
        if: steps.changes.outputs.compositions != '' || steps.changes.outputs.xrds != '' || steps.changes.outputs.functions != '' || steps.changes.outputs.providers != '' || steps.changes.outputs.configs != ''
        run: |
          echo "Validating YAML syntax..."

          COMPOSITIONS="${{ steps.changes.outputs.compositions }}"
          XRDS="${{ steps.changes.outputs.xrds }}"
          FUNCTIONS="${{ steps.changes.outputs.functions }}"
          PROVIDERS="${{ steps.changes.outputs.providers }}"
          CONFIGS="${{ steps.changes.outputs.configs }}"

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            if [[ -f "$file" ]]; then
              echo "Checking $file"
              if yq eval '.' "$file" > /dev/null; then
                echo "  Valid YAML"
              else
                echo "  Invalid YAML syntax"
                exit 1
              fi
            fi
          done <<< "$(printf '%s\n' "$COMPOSITIONS" "$XRDS" "$FUNCTIONS" "$PROVIDERS" "$CONFIGS")"

      - name: Validate Crossplane resources
        if: steps.changes.outputs.compositions != '' || steps.changes.outputs.xrds != ''
        run: |
          echo "Validating Crossplane platform resources..."

          COMPOSITIONS="${{ steps.changes.outputs.compositions }}"
          XRDS="${{ steps.changes.outputs.xrds }}"

          # Validate Compositions
          while IFS= read -r composition; do
            [[ -z "$composition" ]] && continue
            if [[ -f "$composition" ]]; then
              echo "Validating Composition: $composition"

              if yq eval '.apiVersion == "apiextensions.crossplane.io/v1" and .kind == "Composition"' "$composition" | grep -q "true"; then
                echo "  Valid Composition resource"

                if yq eval '.spec.compositeTypeRef.apiVersion and .spec.compositeTypeRef.kind' "$composition" | grep -q -v "null"; then
                  echo "  Has compositeTypeRef"
                else
                  echo "  Missing compositeTypeRef"
                  exit 1
                fi
              else
                echo "  Not a valid Composition"
                exit 1
              fi
            fi
          done <<< "$COMPOSITIONS"

          # Validate XRDs
          while IFS= read -r xrd; do
            [[ -z "$xrd" ]] && continue
            if [[ -f "$xrd" ]]; then
              echo "Validating XRD: $xrd"

              if yq eval '.apiVersion == "apiextensions.crossplane.io/v1" and .kind == "CompositeResourceDefinition"' "$xrd" | grep -q "true"; then
                echo "  Valid XRD resource"

                GROUP=$(yq eval '.spec.group' "$xrd")
                PLURAL=$(yq eval '.spec.names.plural' "$xrd")
                KIND=$(yq eval '.spec.names.kind' "$xrd")

                if [[ "$GROUP" != "null" && "$PLURAL" != "null" && "$KIND" != "null" ]]; then
                  echo "  Has required fields: $GROUP/$PLURAL ($KIND)"
                else
                  echo "  Missing required fields (group, names.plural, names.kind)"
                  exit 1
                fi
              else
                echo "  Not a valid XRD"
                exit 1
              fi
            fi
          done <<< "$XRDS"

      - name: Test composition rendering
        if: steps.changes.outputs.compositions != '' && steps.changes.outputs.xrds != ''
        run: |
          echo "Testing composition rendering..."

          XR_SAMPLES=$(find kubernetes/namespaces/base/gkecluster-* -name "*.yaml" 2>/dev/null || true)

          if [[ -n "$XR_SAMPLES" ]]; then
            for xr_sample in $XR_SAMPLES; do
              echo "Testing rendering with: $xr_sample"

              if timeout 30s crossplane beta render "$xr_sample" kubernetes/components/crossplane-compositions/base/**/*.yaml 2>/dev/null; then
                echo "  Composition rendering successful"
              else
                echo "  Composition rendering skipped (may need runtime context)"
              fi
            done
          else
            echo "No sample XRs found for rendering test"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Platform Validation Summary"
          echo ""
          echo "YAML syntax validation completed"
          echo "Crossplane resource validation completed"
          echo "Composition rendering tests completed"
